---
ignore:
  # urllib3 is a transitive dependency pulled in via homeassistant and
  # test deps (pytest-homeassistant-custom-component, etc.). This
  # integration's runtime code depends directly on httpx, not urllib3,
  # so we cannot bump the urllib3 pin from this project. The advisory
  # is fixed in urllib3 >= 2.7.0; remove this entry once the upstream
  # dependency chain ships a compatible release.
  - vulnerability: GHSA-mf9v-mfxr-j63j
    package:
      name: urllib3
      type: python
  # Same rationale as above: transitive via homeassistant / test deps,
  # integration runtime uses httpx, fix lands in urllib3 >= 2.7.0.
  # Remove once the upstream chain updates.
  - vulnerability: GHSA-qccp-gfcp-xxvc
    package:
      name: urllib3
      type: python
  # idna is a transitive dependency (pulled in via httpx and other
  # test/dev deps). The integration's runtime does not depend on idna
  # directly. Advisory GHSA-65pc-fj4g-8rjx is fixed in idna >= 3.15;
  # remove this entry once the upstream dependency chain ships idna >= 3.15.
  - vulnerability: GHSA-65pc-fj4g-8rjx
    package:
      name: idna
      type: python
  # aiohttp is a transitive dependency pulled in via homeassistant
  # core. This integration uses httpx directly, not aiohttp. The
  # advisory is fixed in aiohttp >= 3.14.0; remove once upstream
  # updates.
  - vulnerability: GHSA-jg22-mg44-37j8
    package:
      name: aiohttp
      type: python
  # Same rationale as above: transitive via homeassistant core, fix
  # lands in aiohttp >= 3.14.0. Remove once the upstream chain
  # updates.
  - vulnerability: GHSA-hg6j-4rv6-33pg
    package:
      name: aiohttp
      type: python
  # uv is a build/dev tool, not a runtime dependency. The advisory is
  # fixed in uv >= 0.11.15; remove once the pinned version updates.
  - vulnerability: GHSA-4gg8-gxpx-9rph
    package:
      name: uv
      type: python
  # zeroconf is a transitive dependency pulled in via homeassistant
  # core for mDNS discovery. This integration does not use zeroconf
  # directly. Fixed in zeroconf >= 0.149.5; remove once upstream
  # updates.
  - vulnerability: GHSA-9pgc-3ccv-5297
    package:
      name: zeroconf
      type: python
