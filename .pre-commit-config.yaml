ci:
  autofix_commit_msg: |
    Chore: pre-commit.ci automated linting tools update

    Signed-off-by: pre-commit-ci[bot] <pre-commit-ci[bot]@pre-commit.ci>

    Changes in this pull request are as follows:
  autoupdate_commit_msg: |
    Chore: pre-commit.ci automated linting tools update

    Signed-off-by: pre-commit-ci[bot] <pre-commit-ci[bot]@pre-commit.ci>

    Changes in this pull request are as follows:
  skip: [mypy, aislop]

exclude: |
  (?x)(
      ^docs\/conf.py|
      ^dco-signoffs/|
      ^tests/resources
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
        exclude: (^|/)\.git($|/)
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      # - id: double-quote-string-fixer
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-new-submodules
      - id: forbid-submodules
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: name-tests-test
        args: ["--pytest-test-first"]
        exclude: "^tests/(conftest|helpers)\\.py$"
      # Disabled; TOX lint will otherwise fail
      - id: no-commit-to-branch
        args:
          - --branch=main
      # - id: pretty-format-json
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338  # frozen: v0.49.0
    hooks:
      - id: markdownlint
        args: ["--fix"]
        exclude: ^.(specify|github)/

  - repo: https://github.com/jorisroovers/gitlint
    rev: acc9d9de6369b76d22cb4167029d2035e8730b98 # frozen: v0.19.1
    hooks:
      - id: gitlint
        # args: ["-c body-max-line-length=120", "-c title-max-length=120"]

  - repo: https://github.com/openstack/bashate
    rev: 5798d24d571676fc407e81df574c1ef57b520f23  # frozen: 2.1.1
    hooks:
      - id: bashate
        args: ["--ignore=E006,E011"]
        exclude: |
          (?x)(
              ^\.specify|
              ^\.github
          )

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["-x"] # Check external files
        exclude: ".specify/(extensions/git/|)scripts/*/*"

  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: c04ed26e40637cab1aa9879c693832a9c120fb20  # frozen: v1.7.12.24
    hooks:
      - id: actionlint

  - repo: https://github.com/adrienverge/yamllint.git
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        types: [yaml]
        args:
          [
            "-d",
            "{rules: {line-length: {max: 100}}, ignore-from-file: [.gitignore],}",
          ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 77039ccbba72c8aede339c5f8ae29b42aced0a2e  # frozen: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/fsfe/reuse-tool
    rev: 9fabf9eb815a57aac116b435e8346c200cdb8604  # frozen: v6.2.0
    hooks:
      - id: reuse

  - repo: local
    hooks:
      - id: aislop
        name: aislop ci
        entry: aislop
        args: [ci]
        language: node
        additional_dependencies:
          - aislop@0.12.0
        pass_filenames: false
        require_serial: true

  # - repo: local
  #   hooks:
  #     - id: mypy-cache
  #       name: "create mypy cache"
  #       language: system
  #       pass_filenames: false
  #       entry: bash -c 'if [ ! -d .mypy_cache ]; then mkdir .mypy_cache; fi; exit 0'

  # - repo: https://github.com/abravalheri/validate-pyproject
  #   rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7  # frozen: v0.25
  #   hooks:
  #     - id: validate-pyproject
  #       # Optional extra validations from SchemaStore:
  #       additional_dependencies: ["validate-pyproject-schema-store[all]"]

  # - repo: https://github.com/btford/write-good
  #   rev: f4bd563644dd2c201cedd86c2670305686c16450  # frozen: v1.0.8
  #   hooks:
  #     - id: write-good
  #       files: "\\.(rst|md|markdown|mdown|mkdn)$"
  #       exclude:
  #         - .github/agents/*

  # Check for misspellings in documentation files
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
    hooks:
      - id: codespell
        args: ["-L", "hass,checkin,astroid"]
        exclude: '(\.specify/scripts/bash/common\.sh|uv\.lock)'

  # Automatically upgrade Python syntax for newer versions
  # - repo: https://github.com/asottile/pyupgrade
  #   rev: v3.15.0
  #   hooks:
  #     - id: pyupgrade
  #       args: ['--py37-plus']

  - repo: https://github.com/econchick/interrogate
    rev: a6268877efd41a21197445cc04cbf28f9c6facba  # frozen: 1.7.0
    hooks:
      - id: interrogate
        args: [-vv, --fail-under=100]
        additional_dependencies:
          - setuptools

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
    hooks:
      - id: mypy
        verbose: true
        language_version: python3.14
        args: ["--show-error-codes", "--install-types", "--non-interactive"]
        additional_dependencies:
          - "homeassistant>=2026.4.0"
          - "pytest"
          - "pytest-homeassistant-custom-component>=0.13.0"
          - "httpx"
          - "respx"

  # - repo: local
  #   hooks:
  #     - id: pytest-cov
  #       name: pytest (100% coverage)
  #       language: system
  #       entry: uv run pytest --no-header -q
  #       pass_filenames: false
